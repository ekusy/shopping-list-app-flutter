<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="家族・グループで使える共有買い物リストアプリ">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Kaimono">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Kaimono</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Flutter web はデフォルトで Roboto フォントを fonts.googleapis.com / fonts.gstatic.com
    から実行時ダウンロードする。preconnect でブラウザが事前に DNS 解決・TLS 確立を
    完了させるため、フォントの取得レイテンシが短縮される。
    dns-prefetch は preconnect 非対応の旧ブラウザ向けフォールバック。
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
