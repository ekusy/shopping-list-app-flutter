<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kaimono — App UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: var(--font-sans);
    background:
      radial-gradient(1100px 700px at 50% -10%, #ECEBFF 0%, transparent 55%),
      #EAE8E2;
    min-height: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 32px 16px;
    -webkit-font-smoothing: antialiased;
    color: var(--text-primary);
  }
  .material-symbols-rounded { font-size: 22px; line-height: 1; user-select: none; }
  .caret-sm { font-size: 13px; }
  .ck { color: #fff; font-size: 15px; font-weight: 800; line-height: 1; }
  .badge-x { font-size: 12px; opacity: .85; margin-left: 1px; }
  .sa-ico { font-size: 18px; line-height: 1; }

  /* ---------- Phone shell ---------- */
  .phone {
    width: 390px; height: 800px; flex: none;
    background: var(--surface);
    border-radius: 44px;
    border: 11px solid #14161c;
    box-shadow: 0 40px 90px rgba(30,30,50,.34), 0 6px 20px rgba(30,30,50,.18);
    overflow: hidden; position: relative;
    display: flex; flex-direction: column;
  }
  .statusbar {
    height: 44px; flex: none; background: var(--surface);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 26px; font-family: var(--font-num);
    font-size: 14px; font-weight: 600; color: var(--text-primary);
    position: relative; z-index: 5;
  }
  .statusbar .sb-r { display: flex; gap: 6px; align-items: center; font-size: 13px; }
  .punch { position: absolute; left: 50%; top: 12px; transform: translateX(-50%);
    width: 11px; height: 11px; border-radius: 50%; background: #14161c; }
  .screen { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column;
    background: var(--bg); }
  .navpill { height: 22px; flex: none; background: var(--surface); display: flex;
    align-items: center; justify-content: center; }
  .navpill::after { content: ''; width: 124px; height: 5px; border-radius: 3px;
    background: var(--text-primary); opacity: .28; }

  /* ---------- App bar ---------- */
  .appbar { background: var(--surface); padding: 8px 14px 10px;
    display: flex; align-items: center; gap: 8px; flex: none;
    border-bottom: 1px solid var(--surface-border); }
  .appbar-title { display: flex; align-items: center; gap: 3px;
    font-size: 20px; font-weight: 700; color: var(--primary);
    border: 0; background: transparent; cursor: pointer; padding: 4px 6px 4px 2px;
    border-radius: 10px; max-width: 200px; }
  .appbar-title:hover { background: var(--primary-light); }
  .appbar-title .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .appbar-title .material-symbols-rounded { font-size: 20px; }
  .appbar-spacer { flex: 1; }
  .btn-tonal { background: var(--primary-light); color: var(--primary);
    border: 0; border-radius: 9999px; font-family: var(--font-sans);
    font-size: 13px; font-weight: 600; padding: 8px 14px; cursor: pointer;
    display: flex; align-items: center; gap: 4px; }
  .btn-tonal:hover { filter: brightness(.97); }
  .iconbtn { width: 44px; height: 44px; border: 0; background: transparent;
    border-radius: 50%; color: var(--text-secondary); cursor: pointer; font-size: 21px;
    display: flex; align-items: center; justify-content: center; }
  .iconbtn:hover { background: var(--overlay); }

  /* ---------- Offline banner ---------- */
  .offline { background: rgba(244,67,54,.10); color: var(--error);
    font-size: 12.5px; font-weight: 600; text-align: center; padding: 6px; flex: none; }

  /* ---------- Filter bar ---------- */
  .filterbar { display: flex; gap: 8px; padding: 12px 16px 4px; overflow-x: auto; flex: none;
    scrollbar-width: none; }
  .filterbar::-webkit-scrollbar { display: none; }
  .chip { flex: none; font-size: 13px; font-weight: 500; padding: 8px 16px;
    border-radius: 9999px; background: var(--surface); color: var(--text-secondary);
    border: 1px solid var(--input-border); cursor: pointer; white-space: nowrap;
    transition: background var(--dur-fast) var(--ease-standard); display: flex; align-items: center; gap: 6px; }
  .chip .tdot { width: 7px; height: 7px; border-radius: 2px; background: var(--accent-apricot); }
  .chip.sel { background: var(--primary); color: #fff; border-color: var(--primary); font-weight: 700; }
  .chip.sel .tdot { background: rgba(255,255,255,.85); }

  /* ---------- List ---------- */
  .list { flex: 1; overflow-y: auto; padding: 8px 16px 120px; }
  .list::-webkit-scrollbar { width: 0; }
  .empty { text-align: center; color: var(--text-secondary); font-size: 14px; padding-top: 40px; }

  .section { margin-top: 14px; }
  .sec-head { display: flex; align-items: center; gap: 9px; padding: 4px 2px 7px;
    border-bottom: 2px solid var(--overlay); cursor: pointer; }
  .sec-dot { width: 10px; height: 10px; border-radius: 3px; flex: none; }
  .sec-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .sec-count { font-size: 13px; color: var(--text-secondary); }
  .sec-spacer { flex: 1; }
  .sec-del { font-size: 12px; color: var(--error); background: transparent; border: 0;
    cursor: pointer; padding: 4px 6px; border-radius: 6px; opacity: 0; transition: opacity .15s; }
  .sec-head:hover .sec-del { opacity: 1; }
  .sec-caret { color: var(--text-secondary); font-size: 13px; width: 16px; text-align: center; }
  .sec-body { padding-top: 10px; }
  .sec-purchased .sec-name { color: var(--text-secondary); font-weight: 600; font-size: 16px; }

  /* ---------- Item card ---------- */
  .card-wrap { position: relative; margin-bottom: 10px; border-radius: var(--r-lg); }
  .swipe-actions { position: absolute; inset: 0; display: flex; justify-content: flex-end;
    align-items: stretch; gap: 0; border-radius: var(--r-lg); overflow: hidden; }
  .swipe-btn { width: 64px; border: 0; cursor: pointer; color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; font-size: 12px; font-weight: 600; font-family: var(--font-sans); }
  .swipe-btn.edit { background: #8A91A6; }
  .swipe-btn.del { background: var(--error-accent); }
  .swipe-btn .material-symbols-rounded { font-size: 22px; }

  .card { position: relative; background: var(--surface); border-radius: var(--r-lg);
    box-shadow: var(--shadow-1); padding: 12px 13px; display: flex; flex-direction: column; gap: 8px;
    touch-action: pan-y; user-select: none;
    transition: transform var(--dur-base) var(--ease-standard), background var(--dur-base) var(--ease-standard); }
  .card.dragging { transition: none; }
  .card.vol { background: var(--accent-apricot-light); }
  .card.bought { background: var(--accent-green-light); box-shadow: none; opacity: .82; }
  .card.selected { background: var(--primary-light); box-shadow: 0 0 0 2px var(--primary) inset; }
  .card-row { display: flex; align-items: center; gap: 11px; }
  .check { width: 24px; height: 24px; border-radius: 7px; border: 2px solid var(--input-border);
    flex: none; cursor: pointer; background: var(--surface); display: flex; align-items: center;
    justify-content: center; transition: all var(--dur-fast); }
  .check.on { background: var(--accent-green); border-color: var(--accent-green); color: #fff; }
  .check.on .ck { font-size: 16px; }
  .check.sel { border-color: var(--primary); }
  .check.sel.picked { background: var(--primary); border-color: var(--primary); color: #fff; }
  .item-name { flex: 1; font-size: 16px; font-weight: 600; color: var(--text-primary);
    min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card.bought .item-name { text-decoration: line-through; color: var(--text-secondary); font-weight: 500; }
  .buy-pill { flex: none; border-radius: 9999px; font-family: var(--font-sans); font-size: 13px;
    font-weight: 700; padding: 7px 14px; cursor: pointer; border: 1.5px solid var(--accent-apricot);
    background: transparent; color: var(--accent-apricot-text); display: flex; align-items: center; gap: 5px; }
  .buy-pill:hover { background: var(--accent-apricot-light); }
  .icon-act { width: 36px; height: 36px; border-radius: 10px; border: 0; cursor: pointer;
    background: var(--overlay); display: flex; align-items: center; justify-content: center; font-size: 17px; flex: none; }
  .badge { flex: none; font-size: 11.5px; font-weight: 700; padding: 4px 11px; border-radius: 9999px;
    display: inline-flex; align-items: center; gap: 4px; }
  .badge.mine { background: var(--accent-apricot); color: #fff; }
  .badge.others { background: var(--buyer-badge-bg); color: var(--buyer-badge-text); }
  .card-note { background: rgba(0,0,0,.04); border-radius: var(--r-sm); padding: 7px 10px;
    font-size: 13px; color: var(--text-secondary); }
  .hint { color: var(--text-secondary); font-size: 11px; }

  /* ---------- Bulk action bar ---------- */
  .bulkbar { position: absolute; left: 12px; right: 12px; top: 10px; z-index: 8;
    background: var(--primary); color: #fff; border-radius: var(--r-lg); box-shadow: var(--shadow-2);
    padding: 10px 12px; display: flex; align-items: center; gap: 10px; }
  .bulkbar .cnt { font-weight: 700; font-size: 14px; }
  .bulkbar select { margin-left: auto; border: 0; border-radius: 8px; padding: 6px 8px;
    font-family: var(--font-sans); font-size: 13px; }
  .bulkbar .x { background: rgba(255,255,255,.2); border: 0; color: #fff; border-radius: 8px;
    padding: 6px 10px; cursor: pointer; font-size: 13px; }

  /* ---------- Bottom bar ---------- */
  .bottombar { position: absolute; left: 0; right: 0; bottom: 0; padding: 12px 16px 14px;
    display: flex; align-items: center; gap: 12px; z-index: 6;
    background: linear-gradient(to top, var(--surface) 62%, rgba(255,255,255,0)); }
  .qa-field { flex: 1; display: flex; align-items: center; gap: 8px; background: var(--surface);
    border: 1px solid var(--surface-border); border-radius: var(--r-xl); padding: 5px 6px 5px 18px;
    box-shadow: var(--shadow-1); }
  .qa-field:focus-within { border-color: var(--primary); }
  .qa-input { flex: 1; border: 0; outline: 0; background: transparent; font-family: var(--font-sans);
    font-size: 15px; color: var(--text-primary); padding: 8px 0; }
  .qa-add { border: 0; background: var(--primary); color: #fff; border-radius: 9999px;
    font-family: var(--font-sans); font-size: 14px; font-weight: 600; padding: 9px 18px; cursor: pointer;
    white-space: nowrap; flex: none; }
  .qa-add:disabled { background: var(--text-disabled); cursor: default; }
  .fab { width: 56px; height: 56px; flex: none; border-radius: 9999px; border: 0; cursor: pointer;
    background: var(--primary); color: #fff; box-shadow: var(--shadow-fab); font-size: 28px;
    display: flex; align-items: center; justify-content: center;
    transition: transform var(--dur-fast) var(--ease-standard); }
  .fab:active { transform: scale(.94); }

  /* ---------- Bottom sheet / scrim ---------- */
  .scrim { position: absolute; inset: 0; background: rgba(20,22,28,.42); z-index: 20;
    opacity: 0; pointer-events: none; transition: opacity var(--dur-base); }
  .scrim.show { opacity: 1; pointer-events: auto; }
  .sheet { position: absolute; left: 0; right: 0; bottom: 0; background: var(--surface); z-index: 21;
    border-radius: var(--r-xl) var(--r-xl) 0 0; padding: 10px 18px 22px;
    transform: translateY(110%); transition: transform var(--dur-slow) var(--ease-emphasis);
    box-shadow: 0 -8px 30px rgba(30,30,50,.18); }
  .sheet.show { transform: translateY(0); }
  .sheet-handle { width: 38px; height: 4px; border-radius: 2px; background: var(--surface-border);
    margin: 2px auto 14px; }
  .sheet-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .sheet-title { font-size: 20px; font-weight: 700; }
  .field { margin-bottom: 13px; }
  .label { font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; }
  .input, .textarea, .select { width: 100%; border: 1px solid var(--input-border); border-radius: var(--r-md);
    padding: 12px 14px; font-family: var(--font-sans); font-size: 15px; color: var(--text-primary);
    background: var(--input-bg); outline: 0; }
  .input:focus, .textarea:focus, .select:focus { border-color: var(--primary); border-width: 2px; padding: 11px 13px; }
  .textarea { resize: none; min-height: 64px; }
  .row2 { display: flex; gap: 10px; align-items: stretch; }
  .row2 .select { flex: 1; }
  .photo-btn { border: 1px solid var(--input-border); border-radius: var(--r-md); background: var(--surface);
    color: var(--text-secondary); font-family: var(--font-sans); font-size: 14px; padding: 0 16px; cursor: pointer;
    display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .primary-btn { width: 100%; border: 0; background: var(--primary); color: #fff; border-radius: 9999px;
    font-family: var(--font-sans); font-size: 15px; font-weight: 600; padding: 14px; cursor: pointer; margin-top: 4px; }
  .primary-btn:hover { background: var(--primary-hover); }

  /* ---------- Drawer ---------- */
  .drawer { position: absolute; top: 0; right: 0; bottom: 0; width: 260px; background: var(--surface);
    z-index: 21; transform: translateX(100%); transition: transform var(--dur-slow) var(--ease-emphasis);
    padding: 22px 18px; box-shadow: -8px 0 30px rgba(30,30,50,.16); }
  .drawer.show { transform: translateX(0); }
  .drawer-eyebrow { font-size: 11px; letter-spacing: 1px; font-weight: 600; color: var(--text-secondary);
    text-transform: uppercase; margin-bottom: 10px; }
  .lang-row { display: flex; gap: 8px; margin-bottom: 18px; }
  .lang-btn { flex: 1; border: 1.5px solid var(--primary); background: transparent; color: var(--primary);
    border-radius: var(--r-md); padding: 9px; font-family: var(--font-sans); font-weight: 600; cursor: pointer; }
  .lang-btn.active { background: var(--primary); color: #fff; }
  .drawer-sep { height: 1px; background: var(--surface-border); margin: 6px 0 12px; }
  .drawer-item { display: flex; align-items: center; gap: 12px; padding: 13px 8px; border-radius: 10px;
    font-size: 15px; color: var(--text-primary); cursor: pointer; }
  .drawer-item:hover { background: var(--bg); }
  .drawer-item.danger { color: var(--error); }
  .drawer-item .material-symbols-rounded { font-size: 21px; color: var(--text-secondary); }
  .drawer-item.danger .material-symbols-rounded { color: var(--error); }

  /* ---------- Group switcher modal ---------- */
  .modal-card { position: absolute; left: 22px; right: 22px; top: 90px; background: var(--surface);
    z-index: 21; border-radius: var(--r-lg); box-shadow: var(--shadow-2); padding: 18px;
    transform: scale(.92); opacity: 0; transition: all var(--dur-base) var(--ease-emphasis); }
  .modal-card.show { transform: scale(1); opacity: 1; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .modal-sep { height: 1px; background: var(--surface-border); margin: 12px 0; }
  .grow-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; }
  .grow-row .gname { flex: 1; font-size: 15px; }
  .mini-btn { border: 1.5px solid var(--primary); background: transparent; color: var(--primary);
    border-radius: 9999px; font-family: var(--font-sans); font-size: 12.5px; font-weight: 600;
    padding: 6px 13px; cursor: pointer; }
  .mini-badge { background: var(--primary); color: #fff; border-radius: 9999px; font-size: 11px;
    font-weight: 700; padding: 5px 12px; }
  .modal-link { display: flex; align-items: center; gap: 8px; color: var(--primary); font-size: 14px;
    font-weight: 600; padding: 9px 0; cursor: pointer; }

  /* ---------- Toast ---------- */
  .toast-wrap { position: absolute; left: 0; right: 0; bottom: 92px; display: flex; justify-content: center;
    z-index: 30; pointer-events: none; }
  .toast { background: #2C3E50; color: #fff; border-radius: 9999px; padding: 11px 20px; font-size: 13.5px;
    font-weight: 600; box-shadow: var(--shadow-2); display: flex; align-items: center; gap: 8px;
    transform: translateY(20px); opacity: 0; transition: all var(--dur-base) var(--ease-emphasis); }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--accent-green); }
  .toast.error { background: var(--error); }

  /* ---------- Login ---------- */
  .login-screen { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px;
    background: var(--bg); }
  .login-card { width: 100%; background: var(--surface); border-radius: var(--r-lg); box-shadow: var(--shadow-2);
    padding: 28px 24px; }
  .login-brand { text-align: center; margin-bottom: 6px; font-size: 34px; }
  .login-title { text-align: center; font-size: 24px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
  .login-sub { text-align: center; font-size: 13px; color: var(--text-secondary); margin-bottom: 22px; }
  .login-link { text-align: center; font-size: 13px; color: var(--text-secondary); margin-top: 16px; }
  .login-link b { color: var(--primary); cursor: pointer; }
  .pw-field { position: relative; }
  .pw-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); border: 0;
    background: transparent; color: var(--primary); font-size: 13px; cursor: pointer; font-family: var(--font-sans); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="ItemCard.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
