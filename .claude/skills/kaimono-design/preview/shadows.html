<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--bg); font-family: var(--font-sans); padding: 26px; -webkit-font-smoothing: antialiased; }
  .grid { display:flex; gap: 28px; align-items:center; flex-wrap:wrap; }
  .item { text-align:center; }
  .box { width: 120px; height: 60px; background: var(--surface); border-radius: var(--r-lg); display:flex;align-items:center;justify-content:center; }
  .fab { width:60px;height:60px;border-radius:9999px;background:var(--primary);color:#fff;font-size:26px;box-shadow:var(--shadow-fab);display:flex;align-items:center;justify-content:center; }
  .lbl { font-family: var(--font-num); font-size: 12px; color: var(--text-secondary); margin-top:9px; }
  .lbl b { color: var(--text-primary); display:block; }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-1)">card</div><div class="lbl"><b>shadow-1</b>resting card</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-2)">sheet</div><div class="lbl"><b>shadow-2</b>sheets · menus</div></div>
    <div class="item"><div class="fab">＋</div><div class="lbl"><b>shadow-fab</b>tinted glow</div></div>
  </div>
</body>
</html>
