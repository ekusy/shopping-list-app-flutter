<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--surface); font-family: var(--font-sans); padding: 22px 26px; -webkit-font-smoothing: antialiased; }
  .row { display:flex; align-items:center; gap:16px; padding:6px 0; }
  .lbl { width: 92px; font-family: var(--font-num); font-size: 12px; color: var(--text-secondary); }
  .lbl b { color: var(--text-primary); }
  .bar { height: 16px; background: var(--primary); border-radius: 3px; }
</style>
</head>
<body>
  <div class="row"><div class="lbl"><b>xs</b> 4px</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="lbl"><b>sm</b> 8px</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="lbl"><b>md</b> 16px</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="lbl"><b>lg</b> 24px</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="lbl"><b>xl</b> 32px</div><div class="bar" style="width:32px"></div></div>
</body>
</html>
