<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--surface); font-family: var(--font-sans); padding: 22px 26px; -webkit-font-smoothing: antialiased; }
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 16px 10px; }
  .ic { text-align:center; }
  .glyph { font-size:26px; line-height:1; }
  .nm { font-size:11px; color:var(--text-secondary); margin-top:7px; }
  .nm b { color:var(--text-primary); display:block; font-size:12px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="ic"><div class="glyph">🙋</div><div class="nm"><b>volunteer</b>買うよ</div></div>
    <div class="ic"><div class="glyph">✕</div><div class="nm"><b>cancel</b>担当解除</div></div>
    <div class="ic"><div class="glyph">🔄</div><div class="nm"><b>takeOver</b>代わりに買う</div></div>
    <div class="ic"><div class="glyph">✅</div><div class="nm"><b>bought</b>購入済</div></div>
    <div class="ic"><div class="glyph">↩</div><div class="nm"><b>return</b>未購入に戻す</div></div>
    <div class="ic"><div class="glyph">🗑️</div><div class="nm"><b>delete</b>削除</div></div>
    <div class="ic"><div class="glyph">⏳</div><div class="nm"><b>pending</b>同期待ち</div></div>
    <div class="ic"><div class="glyph">👤</div><div class="nm"><b>others</b>他の人</div></div>
    <div class="ic"><div class="glyph">📷</div><div class="nm"><b>photo</b>写真</div></div>
    <div class="ic"><div class="glyph">▼</div><div class="nm"><b>caret</b>切替/折畳</div></div>
    <div class="ic"><div class="glyph">☰</div><div class="nm"><b>menu</b>ドロワー</div></div>
    <div class="ic"><div class="glyph">＋</div><div class="nm"><b>add</b>詳細追加</div></div>
  </div>
</body>
</html>
