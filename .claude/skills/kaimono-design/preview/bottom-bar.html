<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--bg); font-family: var(--font-sans); padding: 22px; -webkit-font-smoothing: antialiased; }
  .lead { font-size:12px;color:var(--text-secondary);margin:0 0 14px; }
  .bar { display:flex; align-items:center; gap:12px; }
  .field { flex:1; display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--surface-border); border-radius:var(--r-xl); padding:13px 18px; box-shadow:var(--shadow-1); }
  .field .ph { color:var(--text-secondary); font-size:15px; }
  .field .send { margin-left:auto; color:var(--primary); font-weight:700; font-size:14px; }
  .fab { width:56px;height:56px;border-radius:9999px;background:var(--primary);color:#fff;font-size:28px;box-shadow:var(--shadow-fab);display:flex;align-items:center;justify-content:center;flex:none; }
</style>
</head>
<body>
  <p class="lead">Refreshed bottom bar — quick-add field + a single <b>FAB</b> for detail-add. Replaces the cramped stacked field + "＋ 詳細追加" button.</p>
  <div class="bar">
    <div class="field"><span class="ph">商品を追加…</span><span class="send">追加</span></div>
    <div class="fab">＋</div>
  </div>
</body>
</html>
