<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--bg); font-family: var(--font-sans); padding: 18px 22px; -webkit-font-smoothing: antialiased; }
  .card { background:var(--surface); border-radius:var(--r-lg); box-shadow:var(--shadow-1); padding:13px 14px; margin-bottom:11px; display:flex; align-items:center; gap:11px; }
  .check { width:22px;height:22px;border-radius:6px;border:2px solid var(--input-border); flex:none; }
  .check.on { background:var(--accent-green); border-color:var(--accent-green); position:relative; }
  .check.on::after { content:"✓"; color:#fff; font-size:15px; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  .name { font-size:16px; font-weight:600; color:var(--text-primary); flex:1; }
  .badge { font-size:11px; font-weight:700; padding:3px 10px; border-radius:9999px; }
  .b-mine { background:var(--accent-apricot-light); color:var(--accent-apricot-text); }
  .acts { display:flex; gap:6px; }
  .ico { width:36px;height:36px;border-radius:10px;background:var(--overlay);display:flex;align-items:center;justify-content:center;font-size:16px; }
  .ico.buy { background:var(--accent-apricot); }
  .vol { background:var(--accent-apricot-light); }
  .bought .name { text-decoration:line-through; color:var(--text-secondary); }
  .bought { background:var(--accent-green-light); box-shadow:none; opacity:.85; }
</style>
</head>
<body>
  <!-- default -->
  <div class="card">
    <div class="check"></div>
    <div class="name">牛乳 1本</div>
    <div class="acts"><div class="ico buy">🙋</div><div class="ico">✅</div></div>
  </div>
  <!-- volunteering (apricot wash) -->
  <div class="card vol">
    <div class="check"></div>
    <div class="name">卵 1パック</div>
    <span class="badge b-mine">🙋 私が買います</span>
    <div class="acts"><div class="ico">✕</div><div class="ico">✅</div></div>
  </div>
  <!-- bought (green wash, struck) -->
  <div class="card bought">
    <div class="check on"></div>
    <div class="name">食パン</div>
    <div class="acts"><div class="ico">↩</div></div>
  </div>
</body>
</html>
