<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--surface); font-family: var(--font-sans); padding: 22px 26px; -webkit-font-smoothing: antialiased; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { border-radius: var(--r-md); overflow: hidden; border: 1px solid var(--surface-border); }
  .chip { height: 56px; }
  .cap { padding: 7px 9px; }
  .name { font-size: 12px; font-weight: 700; color: var(--text-primary); }
  .hex { font-family: var(--font-num); font-size: 11px; color: var(--text-secondary); text-transform: uppercase; }
  .note { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--bg)"></div><div class="cap"><div class="name">bg (warm)</div><div class="hex">#F6F5F2</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-baseline)"></div><div class="cap"><div class="name">bg baseline</div><div class="hex">#F0F4F8</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--surface);border-bottom:1px solid var(--surface-border)"></div><div class="cap"><div class="name">surface</div><div class="hex">#FFFFFF</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-sunken)"></div><div class="cap"><div class="name">sunken</div><div class="hex">#FBFAF7</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-border)"></div><div class="cap"><div class="name">border</div><div class="hex">#E7E5DF</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--text-primary)"></div><div class="cap"><div class="name">text 1</div><div class="hex">#2C3E50</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--text-secondary)"></div><div class="cap"><div class="name">text 2</div><div class="hex">#546E7A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--input-border)"></div><div class="cap"><div class="name">input border</div><div class="hex">#D9D6CE</div></div></div>
  </div>
</body>
</html>
