<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--surface); font-family: var(--font-sans); padding: 22px 26px; -webkit-font-smoothing: antialiased; }
  .grid { display:flex; gap: 20px; align-items:flex-end; flex-wrap:wrap; }
  .item { text-align:center; }
  .box { width: 76px; height: 56px; background: var(--primary-light); border: 2px solid var(--primary); }
  .lbl { font-family: var(--font-num); font-size: 12px; color: var(--text-secondary); margin-top:7px; }
  .lbl b { color: var(--text-primary); display:block; }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="lbl"><b>sm</b>4px</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="lbl"><b>md</b>8px</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="lbl"><b>lg</b>16px · cards</div></div>
    <div class="item"><div class="box" style="border-radius:20px"></div><div class="lbl"><b>xl</b>20px · field</div></div>
    <div class="item"><div class="box" style="border-radius:9999px"></div><div class="lbl"><b>full</b>chips · FAB</div></div>
  </div>
</body>
</html>
