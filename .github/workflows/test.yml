name: Test

# マージ前ゲート: すべての PR と develop/main への push で静的解析とテストを実行する。
# ブランチ保護で本ワークフローの `test` を必須チェックに指定すること（docs/開発ガイド/Gitワークフロー.md）。
on:
  pull_request:
  push:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed lib test
      - run: flutter analyze
      - run: flutter test

  # Cloud Functions（Node/TypeScript）のビルド・lint・テスト（Issue #37 Phase 0）。
  functions:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
